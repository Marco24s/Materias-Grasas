{% extends 'sigera/base_sigera.html' %}
{% load crispy_forms_tags %}

{% block content %}
<div class="row justify-content-center mt-4 mb-5">
    <div class="col-md-6">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h4 class="fw-bold" style="color: #462880;"><i class="fa-solid fa-ruler-combined me-2"></i>{% if edit_mode %}Editar Talle{% else %}Añadir Talle{% endif %}</h4>
            <a href="{% url 'sigera:catalog_list' %}" class="btn btn-outline-secondary rounded-pill px-3">
                <i class="fa-solid fa-arrow-left me-2"></i>Volver
            </a>
        </div>

        <div class="card shadow-sm border-0" style="border-radius: 15px; overflow: hidden;">
            <div class="card-body p-4">
                <form method="post" novalidate>
                    {% csrf_token %}
                    {{ form|crispy }}
                    <div class="d-grid gap-2 d-md-flex justify-content-md-end mt-4">
                        <button type="submit" class="btn text-white px-4" style="background-color: #6f42c1;">
                            <i class="fa-solid fa-save me-2"></i>{% if edit_mode %}Guardar Cambios{% else %}Guardar Talle{% endif %}
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
