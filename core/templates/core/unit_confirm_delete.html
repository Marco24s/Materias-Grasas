{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center mt-4">
    <div class="col-md-6">
        <div class="card shadow-sm border-danger">
            <div class="card-header bg-danger text-white">
                <h5 class="mb-0"><i class="fa-solid fa-triangle-exclamation me-2"></i> Confirmar Eliminación</h5>
            </div>
            <div class="card-body">
                <p>¿Está seguro que desea eliminar la Unidad <strong>"{{ unit.name }}"</strong>?</p>
                <form method="post">
                    {% csrf_token %}
                    <div class="d-flex justify-content-between mt-4">
                        <a href="{% url 'unit_list' %}" class="btn btn-outline-secondary">Cancelar</a>
                        <button type="submit" class="btn btn-danger"><i class="fa-solid fa-trash me-1"></i> Eliminar Definitivamente</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
