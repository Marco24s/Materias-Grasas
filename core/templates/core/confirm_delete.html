{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow-sm border-danger mt-4">
            <div class="card-header bg-danger text-white">
                <h4 class="mb-0"><i class="fa-solid fa-triangle-exclamation me-2"></i> Confirmar Eliminación</h4>
            </div>
            <div class="card-body">
                <p>¿Está seguro de que desea eliminar el siguiente registro?</p>
                <div class="alert alert-warning">
                    <strong>{{ object }}</strong>
                </div>
                <form method="post">
                    {% csrf_token %}
                    <div class="d-flex justify-content-between mt-4">
                        <a href="javascript:history.back()" class="btn btn-secondary">Cancelar</a>
                        <button type="submit" class="btn btn-danger"><i class="fa-solid fa-trash me-1"></i> Sí, eliminar</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
