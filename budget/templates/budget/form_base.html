{% extends "budget/base_budget.html" %}
{% load crispy_forms_tags %}

{% block budget_content %}
<div class="row justify-content-center">
    <div class="col-lg-8">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="fw-bold">{{ title|default:"Formulario de Gestión" }}</h2>
            <a href="javascript:history.back()" class="btn btn-outline-secondary rounded-pill px-3">
                <i class="fa-solid fa-arrow-left"></i> Cancelar
            </a>
        </div>

        <div class="card card-stats p-4">
            {% if help_text %}
                <div class="alert alert-info border-0 bg-info bg-opacity-10 text-dark small mb-4">
                    <i class="fa-solid fa-circle-info me-1 text-info"></i> {{ help_text }}
                </div>
            {% endif %}

            <form method="post" autocomplete="off">
                {% csrf_token %}
                {{ form|crispy }}
                
                <div class="d-grid mt-4">
                    <button type="submit" class="btn btn-success btn-lg rounded-pill fw-bold">
                        <i class="fa-solid fa-save me-2"></i> Guardar Registro
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
